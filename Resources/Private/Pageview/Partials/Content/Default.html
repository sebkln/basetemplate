<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">
<f:comment>
<!--
    Renders all content elements in a column of a page. Partial is shared among multiple columns.
    Add another partial if you need differing HTML markup (for example, wrappers) for selected columns.
-->
</f:comment>
<f:for each="{records}" as="record">
    <f:cObject
        typoscriptObjectPath="{record.mainType}"
        data="{record}"
        table="{record.mainType}"
    />
</f:for>
</html>
