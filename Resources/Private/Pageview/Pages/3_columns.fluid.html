<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">
<f:layout name="DefaultLayout" />

<f:section name="PageContent">
    <!--TYPO3SEARCH_begin-->
    <div class="o-layout  o-layout--huge">
        <div class="o-layout__item  u-1/1  u-margin-bottom-huge">
            <f:render.contentArea contentArea="{content.top}"/>
        </div>


        <div class="o-layout__item  u-1/1  u-1/2@phablet  u-1/3@tablet  u-margin-bottom-huge">
            <f:render.contentArea contentArea="{content.left}"/>
        </div>
        <div class="o-layout__item  u-1/1  u-1/2@phablet  u-1/3@tablet  u-margin-bottom-huge">
            <f:render.contentArea contentArea="{content.middle}"/>
        </div>
        <div class="o-layout__item  u-1/1  u-1/2@phablet  u-1/3@tablet  u-margin-bottom-huge">
            <f:render.contentArea contentArea="{content.right}"/>
        </div>


        <div class="o-layout__item  u-1/1">
            <f:render.contentArea contentArea="{content.bottom}"/>
        </div>
    </div>
    <!--TYPO3SEARCH_end-->
</f:section>
</html>
