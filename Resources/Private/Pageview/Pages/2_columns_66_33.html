<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">
<f:layout name="DefaultLayout" />

<f:section name="PageContent">
    <!--TYPO3SEARCH_begin-->
    <div class="o-layout  o-layout--huge">
        <div class="o-layout__item  u-1/1  u-margin-bottom-huge">
            <f:render partial="Content/Default" arguments="{records: pageContent.top.records}"/>
        </div>


        <div class="o-layout__item  u-1/1  u-1/2@desktop  u-2/3@wide  u-margin-bottom-huge">
            <f:render partial="Content/Default" arguments="{records: pageContent.main.records}"/>
        </div>
        <div class="o-layout__item  u-1/1  u-1/2@desktop  u-1/3@wide  u-margin-bottom-huge">
            <f:render partial="Content/Default" arguments="{records: pageContent.sidebar.records}"/>
        </div>


        <div class="o-layout__item  u-1/1">
            <f:render partial="Content/Default" arguments="{records: pageContent.bottom.records}"/>
        </div>
    </div>
    <!--TYPO3SEARCH_end-->
</f:section>
</html>
